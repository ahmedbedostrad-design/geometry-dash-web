<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border: 3px solid #333;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            z-index: 100;
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #gameOverScreen.show {
            display: flex;
        }

        #gameOverText {
            font-size: 48px;
            color: #ff4444;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #finalScore {
            font-size: 32px;
            color: #fff;
            margin-bottom: 30px;
        }

        #restartBtn {
            padding: 15px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        #restartBtn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .player {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ff6b6b;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .obstacle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #ff0000;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .coin {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .ground {
            position: absolute;
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, #90EE90, #228B22);
            border-top: 3px solid #000;
            bottom: 0;
        }

        .instructions {
            position: absolute;
            bottom: 80px;
            left: 20px;
            color: #333;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 15px;
            border-radius: 5px;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Score: 0</div>
        <div class="instructions">SPACE or CLICK to Jump</div>
        <div id="gameOverScreen">
            <div id="gameOverText">GAME OVER!</div>
            <div id="finalScore">Final Score: 0</div>
            <button id="restartBtn">Restart Game</button>
        </div>
        <div class="ground"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
